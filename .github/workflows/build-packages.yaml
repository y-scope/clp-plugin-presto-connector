# Builds CLP Presto connector packages for amd64 and arm64.
#
# Flow:
#   resolve-version         use the input version or derive it from pom.xml
#   build-dependency-image  ensure the hash-tagged build-env image exists
#   build                   build .deb / .rpm / .tar.gz artifacts per architecture
#   image                   build the busybox installer image per arch (push on main/tags)
#   manifest                combine per-arch images into a multi-arch tag (main/tags only)
#
# See tools/build-packages/README.md for package-build details.

name: "build-packages"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version override (derived from presto-connector/pom.xml when blank)"
        required: false
        default: ""
  push:
    paths:
      - ".dockerignore"
      - ".github/workflows/build-packages.yaml"
      - ".github/workflows/build-dependency-image.yaml"
      - "presto-connector/**"
      - "taskfile.yaml"
      - "taskfiles/**"
      - "tools/build-packages/**"
      - "tools/yscope-dev-utils"
      - "velox-connector/**"
      # Markdown files don't change the artifact, so skip rebuilds on documentation-only changes.
      - "!**/*.md"

concurrency:
  group: "${{github.workflow}}-${{github.ref}}"
  cancel-in-progress: true

permissions:
  contents: "read"

jobs:
  resolve-version:
    runs-on: "ubuntu-24.04"
    outputs:
      version: "${{steps.version.outputs.version}}"
      publish: "${{steps.publish.outputs.publish}}"
    steps:
      - name: "Check out repository"
        uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"  # v7.0.0
        with:
          persist-credentials: false

      - name: "Resolve package version"
        id: "version"
        env:
          INPUT_VERSION: "${{inputs.version || ''}}"
        run: |-
          version="${INPUT_VERSION}"
          if [[ -z "${version}" ]]; then
            if ! version=$(
              ./presto-connector/mvnw --quiet --file presto-connector/pom.xml \
                help:evaluate \
                -Dexpression=project.version \
                -DforceStdout
            ); then
              echo "::error::Failed to derive project.version with Maven"
              exit 1
            fi
            if [[ -z "${version}" ]]; then
              echo "::error::Maven returned an empty project.version"
              exit 1
            fi
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "::notice::Package version: ${version}"

      - name: "Decide whether to publish images"
        id: "publish"
        env:
          DEFAULT_BRANCH: "${{github.event.repository.default_branch}}"
        run: |-
          # Publish images only from the default branch and version tags so feature
          # branches don't overwrite shared tags.
          if [[ ${GITHUB_REF_NAME} == "${DEFAULT_BRANCH}" || ${GITHUB_REF_TYPE} == tag ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

  build-dependency-image:
    uses: "./.github/workflows/build-dependency-image.yaml"
    permissions:
      contents: "read"
      packages: "write"

  build:
    needs: ["build-dependency-image", "resolve-version"]
    permissions:
      contents: "read"
      packages: "read"
    strategy:
      # Build both architectures so one failure does not hide the other result.
      fail-fast: false
      matrix:
        include:
          - arch: "amd64"
            runner: "ubuntu-24.04"
          - arch: "arm64"
            runner: "ubuntu-24.04-arm"
    runs-on: "${{matrix.runner}}"
    timeout-minutes: 120
    env:
      VERSION: "${{needs.resolve-version.outputs.version}}"
    # Run package steps inside the build-env image, which provides Velox deps,
    # JDK 17, go-task, and packaging tools.
    container:
      image: "${{needs.build-dependency-image.outputs.image}}"
      credentials:
        username: "${{github.actor}}"
        password: "${{secrets.GITHUB_TOKEN}}"
    steps:
      - name: "Check out repository"
        uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"  # v7.0.0
        with:
          persist-credentials: false
          # Required because taskfiles include shared utilities from the submodule.
          submodules: true

      - name: "Build packages"
        id: "packages"
        shell: "bash"
        run: |-
          bash tools/build-packages/internal/container/build-artifacts.sh --version "${VERSION}"

          shopt -s nullglob
          for extension in deb rpm tar.gz; do
            artifact_files=(packages/clp-plugin-presto-connector*."${extension}")
            if (( ${#artifact_files[@]} != 1 )); then
              echo "::error::Expected exactly one .${extension} artifact," \
                "found ${#artifact_files[@]}"
              exit 1
            fi
            printf '%s_filename=%s\n' \
              "${extension//./_}" "${artifact_files[0]##*/}" >> "$GITHUB_OUTPUT"
          done

      - name: "Upload deb package"
        uses: "actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f"  # v6.0.0
        with:
          name: "${{steps.packages.outputs.deb_filename}}"
          path: "packages/${{steps.packages.outputs.deb_filename}}"
          if-no-files-found: "error"
          retention-days: 14

      - name: "Upload rpm package"
        uses: "actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f"  # v6.0.0
        with:
          name: "${{steps.packages.outputs.rpm_filename}}"
          path: "packages/${{steps.packages.outputs.rpm_filename}}"
          if-no-files-found: "error"
          retention-days: 14

      - name: "Upload tarball"
        uses: "actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f"  # v6.0.0
        with:
          name: "${{steps.packages.outputs.tar_gz_filename}}"
          path: "packages/${{steps.packages.outputs.tar_gz_filename}}"
          if-no-files-found: "error"
          retention-days: 14

  # Build the busybox installer image per architecture from the tarball artifact. This runs
  # on the native runner (not inside the build-env container) so docker/buildx is available.
  image:
    needs: ["build", "resolve-version"]
    permissions:
      contents: "read"
      packages: "write"
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: "amd64"
            runner: "ubuntu-24.04"
          - arch: "arm64"
            runner: "ubuntu-24.04-arm"
    runs-on: "${{matrix.runner}}"
    timeout-minutes: 30
    env:
      ARCH: "${{matrix.arch}}"
    steps:
      - name: "Check out repository"
        uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"  # v7.0.0
        with:
          persist-credentials: false

      - name: "Download tarball artifact"
        uses: "actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53"  # v6.0.0
        with:
          pattern: "*-linux-${{matrix.arch}}.tar.gz"
          path: "dist"
          merge-multiple: true

      - name: "Log in to GHCR"
        if: "${{needs.resolve-version.outputs.publish == 'true'}}"
        uses: "docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0"  # v4.4.0
        with:
          registry: "ghcr.io"
          username: "${{github.actor}}"
          password: "${{secrets.GITHUB_TOKEN}}"

      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c"  # v4.2.0

      - name: "Build the installer image (and push when publishing)"
        env:
          PUBLISH: "${{needs.resolve-version.outputs.publish}}"
        run: |-
          image_repo="ghcr.io/$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          shopt -s nullglob
          tarballs=(dist/*-linux-"${ARCH}".tar.gz)
          if (( ${#tarballs[@]} != 1 )); then
            echo "::error::Expected exactly one tarball for ${ARCH}, found ${#tarballs[@]}"
            exit 1
          fi
          # Push from the default branch / tags; otherwise just build to validate.
          output="--load"
          if [[ "${PUBLISH}" == "true" ]]; then
            output="--push"
          fi
          bash tools/build-packages/build-installer-init-image.sh \
            --tarball "${tarballs[0]}" \
            --arch "${ARCH}" \
            --repo "${image_repo}" \
            "${output}"

  # Combine the per-architecture installer images into one multi-arch version tag.
  manifest:
    needs: ["image", "resolve-version"]
    if: "${{needs.resolve-version.outputs.publish == 'true'}}"
    permissions:
      packages: "write"
    runs-on: "ubuntu-24.04"
    timeout-minutes: 15
    env:
      VERSION: "${{needs.resolve-version.outputs.version}}"
    steps:
      - name: "Log in to GHCR"
        uses: "docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0"  # v4.4.0
        with:
          registry: "ghcr.io"
          username: "${{github.actor}}"
          password: "${{secrets.GITHUB_TOKEN}}"

      - name: "Create multi-arch manifest"
        run: |-
          image_repo="ghcr.io/$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          # Docker tags allow only [A-Za-z0-9_.-]; sanitize to match the build script.
          tag_version="${VERSION//[^A-Za-z0-9_.-]/_}"
          docker buildx imagetools create \
            --tag "${image_repo}:${tag_version}" \
            "${image_repo}:${tag_version}-amd64" \
            "${image_repo}:${tag_version}-arm64"
