# Builds the dependency image used by tools/build-packages/build.sh, publishing
# it to GHCR so both CI and local users can pull instead of building from
# source (~2 hours).
#
# Image tag: `velox-<velox-sha>`, where <velox-sha> is the exact Velox SHA
# pinned by prestodb/presto's submodule (derived via cmake FetchContent +
# git ls-tree). This guarantees header/ABI compatibility with the plugin build.
#
# Rebuild policy: rebuilds when either
#   - the image doesn't yet exist in GHCR, OR
#   - tools/build-packages/dependency-image/** changed in this push
#     (the tag stays the same; we overwrite — see README "Dependency image").
#
# DAG:
#   plan (derive SHA + cache check) ─► build (matrix amd64+arm64) ─► manifest

name: "build-dependency-image"

on:
  workflow_call:
    outputs:
      image:
        description: "Fully qualified dependency image reference"
        value: "${{jobs.plan.outputs.image}}"
  workflow_dispatch:

concurrency:
  group: "${{github.workflow}}-${{github.ref}}"
  cancel-in-progress: true

permissions:
  contents: "read"

env:
  OUTPUT_IMAGE_REPO: "ghcr.io/${{github.repository}}"
  IMAGE_NAME: "build-env"

jobs:
  plan:
    runs-on: "ubuntu-24.04"
    outputs:
      velox-sha:   "${{steps.shas.outputs.velox-sha}}"
      image:       "${{steps.shas.outputs.image}}"
      needs-build: "${{steps.decide.outputs.needs-build}}"
    steps:
      - name: "Check out repository"
        uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5"  # v4.3.1
        with:
          # paths-filter needs the previous commit to diff against.
          fetch-depth: 2

      - name: "Derive velox SHA"
        id: "shas"
        run: |-
          # shellcheck source=tools/build-packages/dependency-image/lib.sh
          source tools/build-packages/dependency-image/lib.sh
          { read -r velox_sha; read -r velox_scripts; } < <(derive_velox_sha)
          image=$(image_ref \
              "${{env.OUTPUT_IMAGE_REPO}}" "${{env.IMAGE_NAME}}" "${velox_sha}")
          echo "velox-sha=${velox_sha}" >> "$GITHUB_OUTPUT"
          echo "velox-scripts=${velox_scripts}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: "Detect dependency-image changes"
        id: "changed"
        uses: "dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36"  # v3.0.2
        with:
          filters: |
            dockerfile:
              - 'tools/build-packages/dependency-image/**'

      - name: "Log in to GHCR"
        uses: "docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9"  # v3.7.0
        with:
          registry: "ghcr.io"
          username: "${{github.actor}}"
          password: "${{secrets.GITHUB_TOKEN}}"

      - name: "Decide whether to rebuild"
        id: "decide"
        run: |-
          if [[ "${{steps.changed.outputs.dockerfile}}" == "true" ]]; then
            echo "::notice::Dockerfile changed — forcing rebuild"
            echo "needs-build=true" >> "$GITHUB_OUTPUT"
          elif docker buildx imagetools inspect \
              "${{steps.shas.outputs.image}}" &>/dev/null; then
            echo "::notice::${{steps.shas.outputs.image}} already exists — skipping rebuild"
            echo "needs-build=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::${{steps.shas.outputs.image}} not found — will build"
            echo "needs-build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: "plan"
    if: "needs.plan.outputs.needs-build == 'true'"
    permissions:
      contents: "read"
      packages: "write"
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: "amd64"
            runner: "ubuntu-24.04"
          - arch: "arm64"
            runner: "ubuntu-24.04-arm"
    runs-on: "${{matrix.runner}}"
    timeout-minutes: 360

    steps:
      - name: "Check out repository"
        uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5"  # v4.3.1

      - name: "Log in to GHCR"
        uses: "docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9"  # v3.7.0
        with:
          registry: "ghcr.io"
          username: "${{github.actor}}"
          password: "${{secrets.GITHUB_TOKEN}}"

      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f"  # v3.12.0

      - name: "Build and push per-arch dependency image"
        run: |-
          # shellcheck source=tools/build-packages/dependency-image/lib.sh
          source tools/build-packages/dependency-image/lib.sh
          { read -r velox_sha; read -r velox_scripts; } < <(derive_velox_sha)
          build_image \
              "${{needs.plan.outputs.image}}-${{matrix.arch}}" \
              "linux/${{matrix.arch}}" \
              "${velox_scripts}" \
              "--push"

  manifest:
    needs: ["plan", "build"]
    permissions:
      contents: "read"
      packages: "write"
    runs-on: "ubuntu-24.04"
    timeout-minutes: 15

    steps:
      - name: "Log in to GHCR"
        uses: "docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9"  # v3.7.0
        with:
          registry: "ghcr.io"
          username: "${{github.actor}}"
          password: "${{secrets.GITHUB_TOKEN}}"

      - name: "Create multi-arch manifest"
        env:
          IMAGE: "${{needs.plan.outputs.image}}"
        run: |-
          docker buildx imagetools create \
            --tag "${IMAGE}" \
            "${IMAGE}-amd64" \
            "${IMAGE}-arm64"
