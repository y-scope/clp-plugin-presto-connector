version: "3"

tasks:
  check:
    cmds:
      - task: format-check
      - task: lint-check

  fix:
    cmds:
      - task: format
      - task: lint

  format-check:
    cmd: mvn spotless:check

  format:
    cmd: mvn spotless:apply

  lint-check:
    cmd: mvn compile spotbugs:check

  lint:
    cmd: mvn compile spotbugs:check
