version: "3"

includes:
  deps:
    internal: true
    taskfile: "deps.yaml"
  utils:
    internal: true
    taskfile: "../../tools/yscope-dev-utils/exports/taskfiles/utils/utils.yaml"

vars:
  G_VELOX_CONNECTOR_BUILD_DIR: "{{.G_BUILD_DIR}}/velox-connector"

tasks:
  build:
    deps:
      - task: "generate"
    cmds:
      - task: "utils:cmake:build"
        vars:
          BUILD_DIR: "{{.G_VELOX_CONNECTOR_BUILD_DIR}}"
          JOBS: "{{.G_CPP_MAX_PARALLELISM_PER_BUILD_TASK}}"
          TARGETS: ["clp-plugin-velox-connector"]

  generate:
    internal: true
    deps:
      - "deps:install-all"
    cmds:
      - task: "utils:cmake:generate"
        vars:
          BUILD_DIR: "{{.G_VELOX_CONNECTOR_BUILD_DIR}}"
          SOURCE_DIR: "{{.ROOT_DIR}}"
          # Tell the plugin's CMakeLists where deps:install-all put things. Without this, its
          # default (`<source>/build/deps/cpp`) misses the arch-keyed install path the packaging
          # build uses, so CLP's transitive find_package(antlr4-runtime) fails.
          EXTRA_ARGS: ["-DDEPS_CPP_DIR={{.G_DEPS_CPP_DIR}}"]
