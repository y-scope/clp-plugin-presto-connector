version: "3"

vars:
  G_LINT_VENV_DIR: "{{.G_BUILD_DIR}}/lint-venv"

tasks:
  check:
    cmds:
      - task: "check-yaml"
      - task: "check-java-bug"
      - task: "check-java-lint"

  clean:
    cmd: "rm -rf '{{.G_LINT_VENV_DIR}}'"

  fix:
    cmds:
      - task: "fix-yaml"
      - task: "fix-java-lint"

  yaml:
    aliases:
      - "check-yaml"
      - "fix-yaml"
    deps: ["venv"]
    cmds:
      - |-
        . "{{.G_LINT_VENV_DIR}}/bin/activate"
        yamllint \
          --config-file "tools/yscope-dev-utils/exports/lint-configs/.yamllint.yml" \
          --strict \
          .github/ \
          taskfile.yaml \
          taskfiles/

  venv:
    internal: true
    vars:
      CHECKSUM_FILE: "{{.G_BUILD_DIR}}/{{.TASK | replace \":\" \"#\"}}.md5"
      OUTPUT_DIR: "{{.G_LINT_VENV_DIR}}"
    sources:
      - "{{.ROOT_DIR}}/lint-requirements.txt"
      - "{{.ROOT_TASKFILE}}"
      - "{{.TASKFILE}}"
    generates: ["{{.CHECKSUM_FILE}}"]
    run: "once"
    deps:
      - ":init"
      - task: ":utils:checksum:validate"
        vars:
          CHECKSUM_FILE: "{{.CHECKSUM_FILE}}"
          INCLUDE_PATTERNS: ["{{.OUTPUT_DIR}}"]
    cmds:
      - task: ":utils:misc:create-venv"
        vars:
          LABEL: "lint"
          OUTPUT_DIR: "{{.OUTPUT_DIR}}"
          REQUIREMENTS_FILE: "{{.ROOT_DIR}}/lint-requirements.txt"

      # This command must be last
      - task: ":utils:checksum:compute"
        vars:
          CHECKSUM_FILE: "{{.CHECKSUM_FILE}}"
          INCLUDE_PATTERNS: ["{{.OUTPUT_DIR}}"]

  check-java-lint:
    cmds:
      - task: "presto-connector:lint:lint-check"

  fix-java-lint:
    cmds:
      - task: "presto-connector:lint:lint"

  check-java-bug:
    cmds:
      - task: "presto-connector:lint:bug-check"
