version: "3"

includes:
  deps: "deps.yaml"
  utils:
    internal: true
    taskfile: "../../tools/yscope-dev-utils/exports/taskfiles/utils/utils.yaml"

vars:
  G_VELOX_CONNECTOR_BUILD_DIR: "{{.G_BUILD_DIR}}/velox-connector"
  DEFAULT_DEPS_CPP_DIR: "{{.G_VELOX_CONNECTOR_BUILD_DIR}}/deps/cpp"
  G_DEPS_CPP_DIR: '{{.CLP_PLUGIN_DEPS_CPP_DIR | default .DEFAULT_DEPS_CPP_DIR}}'
  DEFAULT_FETCHCONTENT_BASE_DIR: "{{.G_VELOX_CONNECTOR_BUILD_DIR}}/_deps"
  G_FETCHCONTENT_BASE_DIR: '{{.FETCHCONTENT_BASE_DIR | default .DEFAULT_FETCHCONTENT_BASE_DIR}}'

tasks:
  build:
    deps:
      - "deps:install-all"
    cmds:
      - task: "build-with-installed-deps"

  build-with-installed-deps:
    desc: "Builds the connector using dependencies already installed in G_DEPS_CPP_DIR."
    preconditions:
      - sh: "test -f '{{.G_DEPS_CPP_CMAKE_SETTINGS_DIR}}/all-deps.cmake'"
        msg: "Installed dependency settings not found; run velox-connector:deps:install-all first."
    cmds:
      - task: "generate"
      - task: "utils:cmake:build"
        vars:
          BUILD_DIR: "{{.G_VELOX_CONNECTOR_BUILD_DIR}}"
          TARGETS: ["clp-plugin-velox-connector"]

  clean:
    cmd: "rm -rf '{{.G_VELOX_CONNECTOR_BUILD_DIR}}'"

  generate:
    internal: true
    cmds:
      - task: "utils:cmake:generate"
        vars:
          BUILD_DIR: "{{.G_VELOX_CONNECTOR_BUILD_DIR}}"
          EXTRA_ARGS:
            - "-DLIBCLP_PLUGIN_VELOX_CONNECTOR_DEPS_CMAKE_SETTINGS=\
                {{.G_DEPS_CPP_CMAKE_SETTINGS_DIR}}/all-deps.cmake"
            - "-DFETCHCONTENT_BASE_DIR={{.G_FETCHCONTENT_BASE_DIR}}"
            - "-DPRESTO_GIT_TAG={{.G_PRESTO_GIT_TAG}}"
          SOURCE_DIR: "{{.ROOT_DIR}}/velox-connector"
