version: "3"

includes:
  deps: "deps.yaml"
  utils:
    internal: true
    taskfile: "../../tools/yscope-dev-utils/exports/taskfiles/utils/utils.yaml"

tasks:
  clean:
    cmd: "rm -rf '{{.G_VELOX_CONNECTOR_BUILD_DIR}}'"

  build:
    deps:
      - "generate"
    cmds:
      - task: "utils:cmake:build"
        vars:
          BUILD_DIR: "{{.G_VELOX_CONNECTOR_BUILD_DIR}}"
          TARGETS: ["clp-plugin-velox-connector"]

  generate:
    internal: true
    deps:
      - "deps:install-all"
    cmds:
      - task: "utils:cmake:generate"
        vars:
          BUILD_DIR: "{{.G_VELOX_CONNECTOR_BUILD_DIR}}"
          SOURCE_DIR: "{{.ROOT_DIR}}/velox-connector"
          EXTRA_ARGS:
            - "-DLIBCLP_PLUGIN_VELOX_CONNECTOR_DEPS_CMAKE_SETTINGS=\
                {{.G_DEPS_CPP_CMAKE_SETTINGS_DIR}}/all-deps.cmake"
